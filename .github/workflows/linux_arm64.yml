# aarch64 .deb for Mobian / Debian arm64 (e.g. OnePlus 6T).
# Builds on ubuntu-24.04-arm (same deps as upstream linux_x64.yml).

name: Build for Linux arm64 (Mobian)

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (optional)"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (optional)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build-mobian-deb:
    name: Linux arm64 .deb (Mobian)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build \
            libayatana-appindicator3-dev unzip webkit2gtk-4.1 libasound2-dev patchelf
          sudo apt-get install -y gcc g++ autoconf automake debhelper glslang-dev ladspa-sdk \
            xutils-dev libarchive-dev libbluray-dev libbs2b-dev libcaca-dev \
            libcdio-paranoia-dev libdrm-dev libdav1d-dev libdvdnav-dev libegl1-mesa-dev \
            libepoxy-dev libfontconfig-dev libfreetype6-dev libfribidi-dev libgl1-mesa-dev \
            libgbm-dev libgme-dev libgsm1-dev libharfbuzz-dev libjpeg-dev libbrotli-dev \
            liblcms2-dev libmodplug-dev libmp3lame-dev libopenal-dev libopus-dev \
            libopencore-amrnb-dev libopencore-amrwb-dev libpulse-dev librtmp-dev \
            libsdl2-dev libsixel-dev libssh-dev libsoxr-dev libspeex-dev libtool \
            libv4l-dev libva-dev libvdpau-dev libvorbis-dev libvo-amrwbenc-dev \
            libunwind-dev libvpx-dev libwayland-dev libx11-dev libxext-dev \
            libxkbcommon-dev libxrandr-dev libxss-dev libxv-dev libxvidcore-dev \
            linux-libc-dev nasm pkg-config python3 python3-docutils wayland-protocols \
            x11proto-core-dev zlib1g-dev libfdk-aac-dev libtheora-dev libwebp-dev \
            unixodbc-dev libpq-dev libxxhash-dev libaom-dev libmpv-dev

      # stable channel has no arm64 Linux SDK in flutter-action's release index; use git tag.
      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/flutter
            ~/.pub-cache
          key: flutter-arm64-${{ hashFiles('pubspec.yaml', 'pubspec.lock') }}
          restore-keys: flutter-arm64-

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION="$(grep -E '^\s*flutter:\s*' pubspec.yaml | head -1 | awk '{print $2}')"
          export FLUTTER_ROOT="${HOME}/flutter"
          if [[ ! -x "${FLUTTER_ROOT}/bin/flutter" ]]; then
            git clone --depth 1 -b "${FLUTTER_VERSION}" https://github.com/flutter/flutter.git "${FLUTTER_ROOT}"
          fi
          echo "${FLUTTER_ROOT}/bin" >> "${GITHUB_PATH}"
          flutter config --enable-linux-desktop
          flutter precache --linux
          flutter --version

      - name: Prepare version and build Linux arm64
        run: bash .github/scripts/build-linux-arm64-deb.sh

      - name: Upload arm64 deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux_deb_arm64_mobian
          path: PiliPlus_linux_*_arm64.deb
          if-no-files-found: error

      - name: Upload arm64 tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux_tar_arm64_mobian
          path: PiliPlus_linux_*_arm64.tar.gz
          if-no-files-found: error

      - name: Release
        if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') || (github.event_name == 'workflow_call' && inputs.tag != '') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || inputs.tag }}
          name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || inputs.tag }}
          files: |
            PiliPlus_linux_*_arm64.deb
            PiliPlus_linux_*_arm64.tar.gz
