# aarch64 .deb for Mobian / Debian arm64 (e.g. OnePlus 6T).
# Build script: .github/scripts/build-linux-arm64-deb.sh

name: Build for Linux arm64 (Mobian)

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (optional)"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (optional)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build-mobian-deb:
    name: Linux arm64 .deb (Mobian)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Flutter Linux arm64 and package .deb
        env:
          FLUTTER_VERSION: "3.44.0"
        run: |
          set -euo pipefail
          chmod +x .github/scripts/build-linux-arm64-deb.sh
          docker run --rm \
            -e FLUTTER_VERSION \
            -e GITHUB_ENV \
            -v "$PWD:/src" \
            -v "$GITHUB_ENV:$GITHUB_ENV" \
            -w /src \
            arm64v8/debian:bookworm \
            bash .github/scripts/build-linux-arm64-deb.sh

      - name: Upload arm64 deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux_deb_arm64_mobian
          path: PiliPlus_linux_*_arm64.deb
          if-no-files-found: error

      - name: Upload arm64 tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux_tar_arm64_mobian
          path: PiliPlus_linux_*_arm64.tar.gz
          if-no-files-found: error

      - name: Release
        if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') || (github.event_name == 'workflow_call' && inputs.tag != '') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || inputs.tag }}
          name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || inputs.tag }}
          files: |
            PiliPlus_linux_*_arm64.deb
            PiliPlus_linux_*_arm64.tar.gz
